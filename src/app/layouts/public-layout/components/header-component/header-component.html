
<nav class="fixed top-0 left-0 right-0 z-50">
  <div class="glass-nav">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a routerLink="" class="flex items-center gap-2.5 group">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background: var(--btn-bg);">
            <span style="color: var(--btn-text); font-weight:800; font-size:1rem; font-family:'Outfit',sans-serif;">D</span>
          </div>
          <span class="font-bold text-xl" style="font-family:'Outfit',sans-serif; color: var(--color-text);">DummyStore</span>
        </a>

        <!-- Desktop Nav Links -->
        <div class="hidden md:flex items-center gap-7">
          <a routerLink="/"  routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link ">Home</a>
          <a [routerLink]="UrlBuilder.route('products')" routerLinkActive="active" class="nav-link ">Products</a>
          <a [routerLink]="UrlBuilder.route('recipes')" routerLinkActive="active" class="nav-link ">Recipes</a>
          <a [routerLink]="UrlBuilder.route('posts')" routerLinkActive="active" class="nav-link ">Posts</a>
        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-2.5">
          <!-- Cart Dropdown -->
<!--          <div class="relative" id="cart-dropdown-wrap" onmouseenter="openCartDropdown()" onmouseleave="closeCartDropdown()">-->
            <div class="relative" id="cart-dropdown-wrap" >
            <a routerLink="/cart" class="btn-glass p-2 rounded-full relative inline-flex" title="Cart">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
              <span id="cart-count" class="absolute -top-1 -right-1 w-5 h-5 rounded-full text-xs font-bold items-center justify-center" style="background:var(--btn-bg);color:var(--btn-text);display:flex;">
                3</span>
            </a>
            <div id="cart-dropdown" class="absolute right-0 top-full mt-1 w-80 rounded-xl overflow-hidden" style="background:var(--glass-bg-strong);backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:var(--glass-shadow-hover);z-index:50;display:none">
              <div class="p-3" style="border-bottom:1px solid var(--glass-border)">
                <span class="text-sm font-semibold" style="color:var(--color-text)">Shopping Cart</span>
              </div>
              <div id="cart-dropdown-items" class="max-h-64 overflow-y-auto"></div>
              <div class="p-3" style="border-top:1px solid var(--glass-border)">
                <a routerLink="/cart" class="btn-primary w-full py-2 rounded-lg text-sm text-center block">View Cart</a>
              </div>
            </div>
          </div>

          <app-theme-color />


                <!-- Logged in user -->
<!--                <a href="profile.html" class="hidden sm:flex items-center gap-2 btn-glass px-3 py-1.5 rounded-full">-->
<!--                  <img src="${user?.image || 'https://dummyjson.com/icon/emilys/40'}" alt="" class="w-7 h-7 rounded-full object-cover">-->
<!--                  <span class="text-sm font-medium" style="color:var(&#45;&#45;color-text)">user?.firstName || 'User'</span>-->
<!--                </a>-->
<!--                <button onclick="logout()" class="btn-glass px-3 py-1.5 rounded-full text-sm font-medium">Logout</button>-->
<!--             -->
                <a [routerLink]="UrlBuilder.route('auth','login')" class="hidden sm:inline-flex btn-glass px-4 py-1.5 rounded-full text-sm font-medium">Login</a>
                <a [routerLink]="UrlBuilder.route('auth','signup')" class="hidden sm:inline-flex btn-primary px-4 py-1.5 rounded-full text-sm">Sign Up</a>

          <app-dashboard-icon (click)="openModalTest()" />

          <!-- Mobile Menu Button -->
          <button
            type="button"
            (click)="onToggleMobileMenu()"
            class="md:hidden btn-glass p-2 rounded-lg"
            id="mobile-menu-btn"
            [attr.aria-expanded]="mobileMenuOpen()"
            aria-label="Toggle mobile menu"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <app-mobile-header
    [isOpen]="mobileMenuOpen()"
    (closeMenu)="onCloseMobileMenu()"
  />
</nav>
<!-- Spacer for fixed navbar -->
<div class="h-16"></div>
