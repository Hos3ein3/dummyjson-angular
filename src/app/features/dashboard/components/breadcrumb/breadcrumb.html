
<div class="breadcrumb">
  <a [routerLink]="UrlBuilder.route('dashboard')">Dashboard</a>
  <span class="sep">/</span>
  @for (item of items(); track $index) {
    @if (item.link) {
      <a [routerLink]="item.link" class="hover:underline">
        {{ item.label }}
      </a>
    } @else {
      <span style="color: var(--color-text);">
            {{ item.label }}
          </span>
    }

    @if ($index < items().length - 1) {
      <span>/</span>
    }
  }
</div>
