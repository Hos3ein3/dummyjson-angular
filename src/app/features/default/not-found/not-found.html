<section class="min-h-[calc(100vh-4rem)] flex items-center py-16">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
    <div class="glass-card rounded-[2rem] p-8 md:p-12 text-center fade-in visible">
      <div class="relative mx-auto mb-6 w-28 h-28">
        <div class="absolute inset-0 rounded-[2rem]" style="background: var(--glass-bg-hover); filter: blur(16px);"></div>
        <div class="relative w-28 h-28 rounded-[2rem] glass flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
               style="color: var(--color-text);">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="8.5" y1="8.5" x2="13.5" y2="13.5"></line>
            <line x1="13.5" y1="8.5" x2="8.5" y2="13.5"></line>
          </svg>
        </div>
      </div>

      <span class="badge mb-4">404 Error</span>
      <h1 class="text-6xl md:text-8xl font-extrabold text-gradient">404</h1>
      <h2 class="text-2xl md:text-3xl font-bold mt-4" style="color: var(--color-text);">Page not found</h2>
      <p class="mt-3 max-w-xl mx-auto text-sm md:text-base" style="color: var(--color-text-muted);">
        The page you’re looking for doesn’t exist anymore, was moved, or the link is incorrect.
      </p>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mt-8">
        <a routerLink="/" class="btn-primary px-6 py-3 rounded-xl">Go Home</a>
        <button type="button" class="btn-glass px-6 py-3 rounded-xl" (click)="goBack()">
          Go Back
        </button>
      </div>
    </div>
  </div>
</section>
