<section class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8 fade-in">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: var(--btn-bg);">
        <span style="color: var(--btn-text); font-weight:800; font-size:1.5rem; font-family:'Outfit',sans-serif;">D</span>
      </div>
      <h1 class="text-3xl font-bold" style="font-family:'Outfit',sans-serif; color: var(--color-text);">Welcome Back</h1>
      <p class="mt-2 text-sm" style="color: var(--color-text-muted);">Sign in to your DummyStore account</p>
    </div>
<!--    <p class="shake-error">-->
<!--      jbfvidba-->
<!--    </p>-->

    <!-- Login Form -->
    <div class="glass-card rounded-2xl p-6 md:p-8 fade-in " >
      <form [formGroup]="form"  (ngSubmit)="onSubmit()"
           [class.shake-error]="isShakeError" >
        <!-- Username -->
        <div class="mb-5">
          <app-textbox [options]="TextBoxOptions" formControlName="username" />

        </div>

        <!-- Password -->


        <div class="mb-5">
          <app-label [options]="LabelOptions" />
          <div class="relative">
            <app-textbox [options]="PasswordTextBoxOptions" formControlName="password" >



            </app-textbox>
            <button type="button" onclick="togglePasswordVisibility('login-password', this)" class="absolute right-3 top-1/2 -translate-y-1/2" style="color:var(--color-text-muted)">
              <app-eye-off-icon />
            </button>
          </div>
        </div>

        <div class="text-right mb-4">
          <a [routerLink]="UrlBuilder.route('auth','forget-password')" class="text-xs font-medium hover:underline" style="color: var(--color-text-muted);">Forgot Password?</a>
        </div>

        <!-- Hint -->
        <div class="glass rounded-xl p-3 mb-5">
          <p class="text-xs" style="color: var(--color-text-muted);">
            💡 <strong>Test credentials:</strong> Use <code style="color:var(--color-text)">emilys</code> / <code style="color:var(--color-text)">emilyspass</code> to login
          </p>
        </div>

        <!-- Error -->
        <div id="login-error" class="hidden mb-4 p-3 rounded-xl text-sm" style="background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.2);"></div>

        <!-- Submit -->
        <app-button [options]="ButtonOptions" >
          <span id="login-btn-text">Sign In</span>
          <span id="login-spinner" class="hidden">
              <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path   class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
            </span>
        </app-button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-6">
        <div class="flex-1 h-px" style="background: var(--glass-border);"></div>
        <span class="text-xs" style="color: var(--color-text-muted);">or</span>
        <div class="flex-1 h-px" style="background: var(--glass-border);"></div>
      </div>

      <!-- Sign Up Link -->
      <p class="text-center text-sm" style="color: var(--color-text-muted);">
        Don't have an account?
        <a [routerLink]="UrlBuilder.route('auth','signup')" class="font-semibold underline" style="color: var(--color-text);">Sign Up</a>
      </p>
    </div>
  </div>
</section>
