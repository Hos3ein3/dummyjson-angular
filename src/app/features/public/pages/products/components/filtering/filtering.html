<section class="py-4">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="glass-card rounded-2xl p-4 md:p-6 fade-in">
      <div class="flex flex-col md:flex-row gap-4">
        <!-- Search -->
        <div class="flex-1 relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--color-text-muted)"><app-search-icon /></span>
          <input type="text" id="search-input" placeholder="Search products..." class="glass-input pl-10" onkeyup="handleSearch(event)">
        </div>
        <!-- Sort -->
       <app-sorting />
      </div>

      <!-- Category chips -->
      <app-category />
    </div>
  </div>
</section>
