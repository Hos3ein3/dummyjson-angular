<section class="py-4">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="glass-card rounded-2xl p-4 md:p-6 fade-in">
      <div class="flex flex-col md:flex-row gap-4">
        <div class="flex-1 relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--color-text-muted)">
            <app-search-icon />
          </span>

          <input
            type="text"
            placeholder="Search products..."
            class="glass-input pl-10"
            (input)="onSearch($any($event.target).value)"
          >
        </div>

        <app-sorting (sortChanged)="onSortChanged($event)" />
      </div>

<!--      <app-category (categoryChanged)="onCategoryChanged($event)" />-->
      <app-category
        [categories]="categories()"
        [selectedCategory]="selectedCategory()"
        (categoryChanged)="onCategoryChanged($event)"
      ></app-category>
    </div>
  </div>
</section>
