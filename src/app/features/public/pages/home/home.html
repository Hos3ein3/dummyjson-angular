
<!-- ═══════════════ HERO ═══════════════ -->
<app-hero />

<!-- ═══════════════ STATS BAR ═══════════════ -->
<app-stats
  [totalProducts]="products()?.total ?? 0"
  [totalRecipes]="recipes()?.total ?? 0"
  [totalPosts]="posts()?.total ?? 0"
  [totalQuotes]="quotes()?.total ?? 0"
/>
<!-- ═══════════════ FEATURED PRODUCTS ═══════════════ -->
<app-feature-products [products]="products()" />

<!-- ═══════════════ RECIPE HIGHLIGHTS ═══════════════ -->
<app-feature-recipes />

<!-- ═══════════════ DAILY QUOTE ═══════════════ -->
<app-daily-quote/>

<!-- ═══════════════ RECENT POSTS ═══════════════ -->
<app-recent-posts />

<!-- ═══════════════ CTA ═══════════════ -->
<section class="py-20 fade-in">
  <div class="max-w-4xl mx-auto px-4 text-center">
    <div class="glass-card rounded-3xl p-10 md:p-16">
      <h2 class="text-3xl md:text-4xl font-bold mb-4" style="font-family:'Outfit',sans-serif; color: var(--color-text);">Ready to get started?</h2>
      <p class="mb-8 text-base" style="color: var(--color-text-muted);">Create an account and start exploring all the features DummyStore has to offer.</p>
      <div class="flex flex-wrap gap-4 justify-center">
        <a routerLink="/auth/signup" class="btn-primary px-8 py-3 text-base rounded-2xl">Create Account</a>
        <a routerLink="/auth/login"  class="btn-glass px-8 py-3 text-base rounded-2xl">Login</a>
      </div>
    </div>
  </div>
</section>
