<section class="relative py-20 md:py-32 overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="max-w-3xl mx-auto text-center">
      <div class="inline-flex items-center gap-2 badge mb-6 fade-in">
        <span class="w-2 h-2 rounded-full animate-pulse" style="background:var(--success)"></span>
        Powered by DummyJSON API
      </div>
      <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold leading-tight mb-6 fade-in" style="font-family:'Outfit',sans-serif; color: var(--color-text);">
        Discover, Cook &<br>
        <span class="text-gradient">Share Stories</span>
      </h1>
      <p class="text-lg md:text-xl mb-8 leading-relaxed fade-in" style="color: var(--color-text-muted);">
        Browse thousands of products, explore delicious recipes, and read engaging posts — all in one beautifully crafted storefront.
      </p>
      <div class="flex flex-wrap gap-4 justify-center fade-in">
        <a [routerLink]="UrlBuilder.route('products')" class="btn-primary px-8 py-3 text-base rounded-2xl">
          Browse Products
        </a>
        <a [routerLink]="UrlBuilder.route('recipes')" class="btn-glass px-8 py-3 text-base rounded-2xl">
          Explore Recipes
        </a>
      </div>
    </div>
  </div>
  <!-- Decorative hero glass panels -->
  <div class="absolute -top-10 -left-20 w-72 h-72 rounded-3xl glass opacity-30 rotate-12 hidden lg:block"></div>
  <div class="absolute -bottom-10 -right-16 w-64 h-64 rounded-3xl glass opacity-20 -rotate-6 hidden lg:block"></div>
</section>
