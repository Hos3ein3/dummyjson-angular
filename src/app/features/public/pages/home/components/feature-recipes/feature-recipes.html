<section class="py-16 fade-in">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-end justify-between mb-10">
      <div>
        <h2 class="text-3xl md:text-4xl font-bold" style="font-family:'Outfit',sans-serif; color: var(--color-text);">Recipe Highlights</h2>
        <p class="mt-2 text-sm" style="color: var(--color-text-muted);">Delicious meals to try</p>
      </div>
      <a routerLink="/recipes" class="btn-glass px-5 py-2 rounded-xl text-sm hidden sm:inline-flex">
        View All <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="featured-recipes">
      <div class="glass-card rounded-2xl p-4"><div class="skeleton h-48 mb-4"></div><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div>
      <div class="glass-card rounded-2xl p-4"><div class="skeleton h-48 mb-4"></div><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div>
      <div class="glass-card rounded-2xl p-4"><div class="skeleton h-48 mb-4"></div><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div>
      <div class="glass-card rounded-2xl p-4"><div class="skeleton h-48 mb-4"></div><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div>
    </div>
  </div>
</section>
