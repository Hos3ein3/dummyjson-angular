<!-- image-gallery.html -->
<div class="glass-card rounded-2xl p-6 fade-in">
  <div class="rounded-xl overflow-hidden mb-4 h-80 flex items-center justify-center" style ="background: var(--glass-bg);">
    <img [src]="activeImageSrc()" [alt]="product.title"
         class="max-h-full max-w-full object-contain transition-all duration-500">
  </div>

  @if (allImages().length > 1) {
    <div class="flex gap-3 overflow-x-auto pb-2">
      @for (img of allImages(); track img) {
        <button
          (click)="setActive(img)"
          class="thumb-btn flex-shrink-0 w-16 h-16 rounded-lg overflow-hidden border-2 transition-all"
          [style.border-color]="img === activeImageSrc() ? 'var(--color-accent)' : 'var(--glass-border)'"
          style="background: var(--glass-bg);">
          <img [src]="img" alt="" class="w-full h-full object-contain">
        </button>
      }
    </div>
  }
</div>
